<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>أنت غير متصل</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Cairo", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top right, rgba(14,165,233,.28), transparent 26%),
        linear-gradient(155deg, #152241 0%, #28406f 60%, #0f766e 100%);
    }
    .card {
      width: min(90vw, 420px);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 26px 60px rgba(0,0,0,.2);
      text-align: center;
    }
    .icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 34px;
      background: linear-gradient(135deg, #5f63f2, #0ea5e9);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: rgba(255,255,255,.84);
      line-height: 1.9;
    }
    a {
      display: inline-flex;
      margin-top: 18px;
      text-decoration: none;
      color: #152241;
      background: #fff;
      border-radius: 999px;
      padding: 12px 20px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">ERP</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يمكنك مراجعة آخر المحتوى المخزن محليًا إذا كان متاحًا، ثم إعادة المحاولة عند عودة الاتصال.</p>
    <a href="/admin/dashboard">إعادة المحاولة</a>
  </div>
</body>
</html>
